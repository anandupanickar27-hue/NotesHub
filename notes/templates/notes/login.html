{% extends "notes/base.html" %}
{% load static %}

{% block content %}

<div class="auth-page">

    <div class="auth-card">

        <img
            src="{% static 'images/gofi-logo.svg' %}"
            alt="GoFi Logo"
            class="auth-logo">

        <h1>Welcome Back</h1>

        <p>Sign in to continue to GoFi.</p>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Username"
                required>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Password"
                required>

            <button class="btn btn-primary">

                Sign In

            </button>

        </form>

        <div class="auth-footer">

            Don't have an account?

            <a href="{% url 'register' %}">

                Register

            </a>

        </div>

        <div>
            <a href="{% url 'demo_login' %}" class="btn btn-success">
                🚀 Try Demo
            </a>
        </div>

    </div>

</div>

{% endblock %}
