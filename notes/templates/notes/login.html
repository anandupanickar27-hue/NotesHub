{% extends "notes/base.html" %}

{% block content %}

<div class="auth-page">

    <div class="auth-card">

        <div class="auth-logo"></div>

        <h1>Welcome Back</h1>

        <p>Sign in to continue to GoFi.</p>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Username"
                required>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Password"
                required>

            <button class="btn btn-primary">

                Sign In

            </button>

        </form>

        <div class="auth-footer">

            Don't have an account?

            <a href="{% url 'register' %}">

                Register

            </a>

        </div>

    </div>

</div>

{% endblock %}
