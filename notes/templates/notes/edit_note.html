{% extends "notes/base.html" %}

{% block title %}GoFi | Edit Note{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-sm p-5">

            <h2 class="mb-4">
                ✏️ Edit Note
            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Title
                    </label>

                    {{ form.title }}

                </div>

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Category
                    </label>

                    {{ form.category }}

                </div>

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Content
                    </label>

                    {{ form.content }}

                </div>

                <div class="form-check mb-4">

                    {{ form.is_pinned }}

                    <label class="form-check-label ms-2">

                        Pin this note

                    </label>

                </div>

                <div class="d-flex gap-2">

                    <button
                        type="submit"
                        class="btn btn-success">

                        💾 Save Changes

                    </button>

                    <a
                        href="{% url 'library' %}"
                        class="btn btn-outline-secondary">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
