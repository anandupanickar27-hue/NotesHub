services:

  db:

    image: mysql:8.0

    container_name: gofi_mysql

    restart: always

    environment:

      MYSQL_DATABASE: noteshub
      MYSQL_ROOT_PASSWORD: password

    ports:

      - "3306:3306"

    volumes:

      - mysql_data:/var/lib/mysql

  web:

    build: .

    container_name: gofi_app

    command: ""

    volumes:

      - .:/app
      - chroma_data:/app/chroma_db

    ports:

      - "8000:8000"

    env_file:

      - .env

    depends_on:

      - db

volumes:

  mysql_data:

  chroma_data: